<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | The Urban Pulse</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#b6ccff",
              "tertiary-fixed-dim": "#ffb786",
              "primary": "#0058be",
              "on-secondary-fixed-variant": "#304671",
              "on-primary-fixed": "#001a42",
              "inverse-surface": "#2e3132",
              "surface-container-high": "#e7e8e9",
              "background": "#f8f9fa",
              "on-error": "#ffffff",
              "tertiary": "#924700",
              "primary-container": "#2170e4",
              "secondary-fixed-dim": "#b1c6f9",
              "on-primary-container": "#fefcff",
              "secondary-fixed": "#d8e2ff",
              "tertiary-fixed": "#ffdcc6",
              "on-surface": "#191c1d",
              "on-tertiary-fixed": "#311400",
              "on-error-container": "#93000a",
              "primary-fixed": "#d8e2ff",
              "surface-bright": "#f8f9fa",
              "error": "#ba1a1a",
              "on-secondary-container": "#405682",
              "surface": "#f8f9fa",
              "on-tertiary-fixed-variant": "#723600",
              "outline-variant": "#c2c6d6",
              "outline": "#727785",
              "secondary": "#495e8a",
              "surface-container-low": "#f3f4f5",
              "inverse-primary": "#adc6ff",
              "primary-fixed-dim": "#adc6ff",
              "on-primary": "#ffffff",
              "tertiary-container": "#b75b00",
              "on-surface-variant": "#424754",
              "on-primary-fixed-variant": "#004395",
              "surface-container": "#edeeef",
              "surface-dim": "#d9dadb",
              "on-background": "#191c1d",
              "on-tertiary-container": "#fffbff",
              "on-secondary": "#ffffff",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "surface-tint": "#005ac2",
              "on-secondary-fixed": "#001a42",
              "surface-container-highest": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "surface-variant": "#e1e3e4"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(248, 249, 250, 0.6);
        backdrop-filter: blur(12px);
      }
      .ambient-lift {
        box-shadow: 0px 12px 32px rgba(25, 28, 29, 0.06);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- The Navigation Shell is suppressed for Transactional/Login screen as per the "Destination" Rule -->
<main class="flex-grow flex items-center justify-center px-6 py-20 bg-surface-container-low">
<!-- Login Card -->
<div class="w-full max-w-md bg-surface-container-lowest p-10 md:p-12 rounded-xl ambient-lift border border-outline-variant/10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">location_city</span>
</div>
<h1 class="text-2xl font-black tracking-tighter text-on-surface font-headline uppercase">
                    The Urban Pulse
                </h1>
<p class="text-on-surface-variant text-sm font-medium tracking-wide mt-2 opacity-70">
                    Smart Infrastructure Access
                </p>
</div>
<!-- Form -->
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">
                        Email
                    </label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="name@city-pulse.gov" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">
                            Password
                        </label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">
                            Forgot?
                        </a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border-transparent focus:border-primary focus:ring-0 rounded-lg transition-all text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold text-sm tracking-wide rounded-xl active:scale-[0.98] transition-all duration-300 ambient-lift" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Footer Text -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">
                    New to the network? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">
                        Create an account
                    </a>
</p>
</div>
</div>
</main>
<!-- Footer: Executed with Shared Component Identity -->
<footer class="bg-slate-50 dark:bg-slate-950 w-full border-t-0 tonal-shift bg-slate-100 dark:bg-slate-900 flex flex-col md:flex-row justify-between items-center px-8 py-12 space-y-4 md:space-y-0">
<div class="flex flex-col items-center md:items-start space-y-2">
<span class="text-sm font-bold text-slate-900 dark:text-slate-100">The Urban Pulse</span>
<p class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-slate-500 dark:text-slate-400 opacity-80">
                © 2024 The Urban Pulse. Smart Infrastructure Division.
            </p>
</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors opacity-80 hover:opacity-100" href="#">Accessibility</a>
<a class="font-['Inter'] text-xs font-medium uppercase tracking-widest text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors opacity-80 hover:opacity-100" href="#">Contact Support</a>
</div>
</footer>
<!-- Background Decorative Elements (Architectural Layers) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -right-48 w-[32rem] h-[32rem] bg-secondary-container/10 rounded-full blur-3xl"></div>
</div>
</body></html>
