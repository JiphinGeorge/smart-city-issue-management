<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register - CityFix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="script.js"></script>
</head>
<body class="bg-slate-50 dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 font-display">
    
    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 overflow-hidden animate-fade-in-up">
        
        <div class="p-8 pb-6 text-center border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/20">
            <div class="mx-auto size-14 bg-primary rounded-xl flex items-center justify-center text-white mb-4 shadow-lg shadow-primary/30">
                <span class="material-symbols-outlined text-3xl">person_add</span>
            </div>
            <h2 class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Create an Account</h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Join CityFix to report and track issues.</p>
        </div>

        <form id="register-form" class="p-8 flex flex-col gap-5">
            
            <div id="register-error" class="hidden bg-rose-50 dark:bg-rose-900/20 text-rose-600 border border-rose-200 dark:border-rose-800/50 p-3 rounded-lg text-sm font-medium text-center">
                Registration failed.
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Full Name</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[20px]">person</span>
                    <input type="text" id="register-name" required class="form-input w-full pl-11 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:border-primary focus:ring-primary dark:text-white py-3" placeholder="John Doe">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[20px]">mail</span>
                    <input type="email" id="register-email" required class="form-input w-full pl-11 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:border-primary focus:ring-primary dark:text-white py-3" placeholder="user@cityfix.com">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
                </div>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[20px]">lock</span>
                    <input type="password" id="register-password" required class="form-input w-full pl-11 rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:border-primary focus:ring-primary dark:text-white py-3" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="btn-register-submit" class="w-full mt-2 py-3 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 transition-all flex items-center justify-center gap-2">
                Sign Up <span class="material-symbols-outlined text-[18px]">person_add</span>
            </button>

            <div class="mt-4 text-center text-sm text-slate-500 dark:text-slate-400">
                Already have an account? <a href="/login" class="font-bold text-primary hover:underline">Sign In</a>
            </div>
        </form>
    </div>
</body>
</html>
